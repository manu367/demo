<!DOCTYPE html>
<html>
<head>
    <title>Permission UI</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .table thead {
            background: #5bc0de;
            color: white;
        }
        .module-row {
            background: #dff0d8;
            font-weight: bold;
        }
        input[type="text"] {
            width: 60px;
            text-align: center;
        }
    </style>
</head>

<body class="p-4">

<h3 class="text-center mb-4">Update User Permission</h3>

<div class="table-responsive">
    <table class="table table-bordered text-center">
        <thead>
        <tr>
            <th>Tab Name</th>
            <th>Add</th>
            <th>Edit</th>
            <th>View</th>
            <th>Cancel</th>
            <th>Print</th>
            <th>Excel</th>
        </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const data = [
        {
            module: "Masters",
            items: ["Admin Users", "Bin Master", "BOM", "City"]
        },
        {
            module: "Reports",
            items: ["Sales Report", "Stock Report"]
        }
    ];

    function createRow(name) {
        return `
        <tr>
            <td>${name}</td>
            <td><input type="text" class="form-control add"></td>
            <td><input type="text" class="form-control edit"></td>
            <td><input type="text" class="form-control view"></td>
            <td><input type="text" class="form-control cancel"></td>
            <td><input type="text" class="form-control print"></td>
            <td><input type="text" class="form-control excel"></td>
        </tr>
    `;
    }

    $(document).ready(function () {
        let html = "";

        data.forEach(group => {
            html += `<tr class="module-row"><td colspan="7">${group.module}</td></tr>`;

            group.items.forEach(item => {
                html += createRow(item);
            });
        });

        $("#tableBody").html(html);
    });
</script>

</body>
</html>
