<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Responsive Table</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-3">

    <div class="container my-3">

        <div class="card shadow-sm border-0 rounded-4 p-3">

            <!-- Top Row (Sr No + Status) -->
            <div class="d-flex justify-content-between align-items-center mb-2">
                <small class="text-muted">Sr No: <span class="fw-bold">1</span></small>
                <span class="badge bg-success">Active</span>
            </div>

            <!-- Title -->
            <h6 class="fw-bold mb-2">FMS System</h6>

            <hr class="my-2">

            <!-- Content -->
            <div class="small">

                <div class="mb-2">
                    <div class="text-muted">Details</div>
                    <div>This is some sample detail text for demo purpose</div>
                </div>

                <div class="row">
                    <div class="col-6 mb-2">
                        <div class="text-muted">Create Date</div>
                        <div>24-02-2222</div>
                    </div>

                    <div class="col-6 mb-2">
                        <div class="text-muted">Update Date</div>
                        <div>24-09-2333</div>
                    </div>
                </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary btn-sm w-100">Button 1</button>
                <button class="btn btn-outline-secondary btn-sm w-100">Button 2</button>
                <button class="btn btn-danger btn-sm w-100">Button 3</button>
            </div>

        </div>

    </div>
</div>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
